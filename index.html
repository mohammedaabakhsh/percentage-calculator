<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>حاسبة النسبة المئوية</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Cairo', sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      direction: rtl;
      -webkit-font-smoothing: antialiased;
    }
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-enter  { animation: slideUp 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    .partner-enter { animation: fadeIn 0.25s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    .mode-btn  { transition: all 0.2s cubic-bezier(0.22, 1, 0.36, 1); }
    .mode-btn:active  { transform: scale(0.94); }
    .calc-btn  { transition: all 0.18s cubic-bezier(0.22, 1, 0.36, 1); }
    .calc-btn:active  { transform: scale(0.97); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef } = React;

    /* ─── Percentage Calculator Data ─── */
    const MODES = [
      { id: 1, label: "استخراج نسبة", sub: "مثال: كم يساوي 15% من 500 ريال؟", icon: "%" },
      { id: 3, label: "زيادة بنسبة",  sub: "مثال: زد 10% على راتب 5000 ريال", icon: "+" },
      { id: 4, label: "خصم بنسبة",    sub: "مثال: خصم 20% من سعر 800 ريال",   icon: "−" },
    ];
    const CONFIGS = {
      1: { labelA: "النسبة",       unitA: "%", labelB: "المبلغ",        unitB: "" },
      3: { labelA: "نسبة الزيادة", unitA: "%", labelB: "المبلغ الأصلي", unitB: "" },
      4: { labelA: "نسبة الخصم",   unitA: "%", labelB: "السعر الأصلي",  unitB: "" },
    };
    const COLORS = {
      1: { main: "#7c3aed", mid: "#8b5cf6", light: "#a78bfa", glow: "rgba(124,58,237,0.35)" },
      3: { main: "#059669", mid: "#10b981", light: "#34d399", glow: "rgba(5,150,105,0.35)"  },
      4: { main: "#d97706", mid: "#f59e0b", light: "#fbbf24", glow: "rgba(217,119,6,0.35)"  },
    };
    const fmt = n => n.toLocaleString("en-US", { maximumFractionDigits: 2 });

    /* ─── Partner colors ─── */
    const P_COLORS = [
      { main: "#7c3aed", light: "#a78bfa", glow: "rgba(124,58,237,0.3)"  },
      { main: "#0891b2", light: "#22d3ee", glow: "rgba(8,145,178,0.3)"   },
      { main: "#059669", light: "#34d399", glow: "rgba(5,150,105,0.3)"   },
      { main: "#d97706", light: "#fbbf24", glow: "rgba(217,119,6,0.3)"   },
      { main: "#db2777", light: "#f472b6", glow: "rgba(219,39,119,0.3)"  },
      { main: "#dc2626", light: "#f87171", glow: "rgba(220,38,38,0.3)"   },
    ];

    /* ════════════════════════════════
       Percentage Calculator Screen
    ════════════════════════════════ */
    function PercentCalc() {
      const [mode, setMode]     = useState(1);
      const [a, setA]           = useState("");
      const [b, setB]           = useState("");
      const [result, setResult] = useState(null);
      const [resKey, setResKey] = useState(0);
      const inputBRef           = useRef(null);

      const c   = COLORS[mode];
      const cfg = CONFIGS[mode];

      const switchMode = id => { setMode(id); setA(""); setB(""); setResult(null); };

      const calculate = () => {
        const na = parseFloat(a), nb = parseFloat(b);
        if (isNaN(na) || isNaN(nb) || nb === 0) return;
        let res;
        if (mode === 1)      res = { main: fmt((na/100)*nb), unit: "", label: "النتيجة", detail: null };
        else if (mode === 3) { const v=(na/100)*nb; res = { main: fmt(nb+v), unit:"", label:"المبلغ بعد الزيادة", detail:{ sign:"+", val:fmt(v), color:"#34d399" } }; }
        else                 { const v=(na/100)*nb; res = { main: fmt(nb-v), unit:"", label:"السعر بعد الخصم",   detail:{ sign:"−", val:fmt(v), color:"#fb923c" } }; }
        setResult(res); setResKey(k => k+1);
      };

      return (
        <div style={{ width:"100%", maxWidth:440, padding:"0 20px" }}>
          {/* Header */}
          <div style={{ padding:"28px 0 24px", textAlign:"center" }}>
            <p style={{ color:"rgba(255,255,255,0.3)", fontSize:13, fontWeight:500, lineHeight:1.5 }}>
              {MODES.find(m => m.id === mode).sub}
            </p>
          </div>

          {/* Mode Selector */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:16 }}>
            {MODES.map(m => {
              const mc = COLORS[m.id];
              const active = mode === m.id;
              return (
                <button key={m.id} className="mode-btn" onClick={() => switchMode(m.id)} style={{
                  display:"flex", alignItems:"center", gap:10,
                  padding:"13px 16px", borderRadius:16,
                  border: active ? `1.5px solid ${mc.mid}50` : "1.5px solid rgba(255,255,255,0.06)",
                  background: active ? `linear-gradient(135deg, ${mc.main}22, ${mc.light}12)` : "rgba(255,255,255,0.025)",
                  cursor:"pointer",
                  boxShadow: active ? `0 4px 20px ${mc.glow}` : "none",
                }}>
                  <div style={{
                    width:36, height:36, borderRadius:10, flexShrink:0,
                    background: active ? `linear-gradient(135deg, ${mc.main}, ${mc.light})` : "rgba(255,255,255,0.06)",
                    display:"flex", alignItems:"center", justifyContent:"center",
                    fontSize:16, fontWeight:900,
                    color: active ? "#fff" : "rgba(255,255,255,0.25)",
                    boxShadow: active ? `0 4px 12px ${mc.glow}` : "none",
                    transition:"all 0.25s",
                  }}>{m.icon}</div>
                  <span style={{ fontSize:13, fontWeight:700, color: active?"#fff":"rgba(255,255,255,0.3)", transition:"color 0.2s" }}>
                    {m.label}
                  </span>
                </button>
              );
            })}
          </div>

          {/* Card */}
          <div style={{ background:"rgba(255,255,255,0.03)", borderRadius:24, border:"1px solid rgba(255,255,255,0.07)", padding:24, boxShadow:"0 24px 48px rgba(0,0,0,0.4)" }}>
            {[
              { label:cfg.labelA, unit:cfg.unitA, val:a, set:setA, next:()=>inputBRef.current?.focus() },
              { label:cfg.labelB, unit:cfg.unitB, val:b, set:setB, ref:inputBRef, next:calculate },
            ].map((field,i) => (
              <div key={i} style={{ marginBottom:14 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:7 }}>
                  <label style={{ color:"rgba(255,255,255,0.38)", fontSize:12, fontWeight:700, letterSpacing:"0.4px" }}>{field.label}</label>
                  {field.unit && <span style={{ fontSize:11, fontWeight:700, color:c.light, background:`${c.main}22`, borderRadius:6, padding:"2px 9px" }}>{field.unit}</span>}
                </div>
                <input
                  ref={field.ref} type="number" inputMode="decimal"
                  value={field.val} onChange={e=>field.set(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&field.next()}
                  placeholder="0"
                  style={{ width:"100%", padding:"13px 16px", borderRadius:14, border:"1.5px solid rgba(255,255,255,0.08)", background:"rgba(255,255,255,0.04)", color:"#fff", fontSize:24, fontFamily:"Cairo, sans-serif", fontWeight:700, outline:"none", textAlign:"right", transition:"border 0.2s, background 0.2s, box-shadow 0.2s" }}
                  onFocus={e=>{ e.target.style.border=`1.5px solid ${c.mid}`; e.target.style.background="rgba(255,255,255,0.06)"; e.target.style.boxShadow=`0 0 0 4px ${c.glow.replace("0.35","0.12")}`; }}
                  onBlur={e=>{ e.target.style.border="1.5px solid rgba(255,255,255,0.08)"; e.target.style.background="rgba(255,255,255,0.04)"; e.target.style.boxShadow="none"; }}
                />
              </div>
            ))}

            <button className="calc-btn" onClick={calculate} style={{
              width:"100%", padding:"16px 0", marginTop:6, borderRadius:16, border:"none",
              background:`linear-gradient(135deg, ${c.main} 0%, ${c.mid} 50%, ${c.light} 100%)`,
              color:"#fff", fontSize:17, fontFamily:"Cairo, sans-serif", fontWeight:800,
              cursor:"pointer", boxShadow:`0 8px 24px ${c.glow}`, letterSpacing:"0.3px",
            }}>احسب</button>

            {result && (
              <div key={resKey} className="result-enter" style={{ marginTop:16, borderRadius:18, background:`linear-gradient(145deg, ${c.main}18 0%, rgba(255,255,255,0.02) 100%)`, border:`1px solid ${c.mid}35`, padding:"22px 20px", textAlign:"center" }}>
                <p style={{ color:"rgba(255,255,255,0.35)", fontSize:12, fontWeight:700, letterSpacing:"0.8px", marginBottom:8 }}>{result.label}</p>
                <p style={{ color:"#fff", fontSize:52, fontWeight:900, letterSpacing:"-1.5px", lineHeight:1, marginBottom:result.detail?14:0 }}>
                  <span style={{ color:c.light }}>{result.main}</span>
                  {result.unit && <span style={{ fontSize:26, color:c.light, marginRight:6, opacity:0.8 }}>{result.unit}</span>}
                </p>
                {result.detail && (
                  <div style={{ display:"inline-flex", alignItems:"center", gap:6, background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:10, padding:"6px 14px" }}>
                    <span style={{ fontSize:15, fontWeight:900, color:result.detail.color }}>{result.detail.sign}</span>
                    <span style={{ fontSize:15, fontWeight:700, color:"rgba(255,255,255,0.55)" }}>{result.detail.val}</span>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ════════════════════════════════
       Profit Distribution Screen
    ════════════════════════════════ */
    function ProfitCalc() {
      const [total,    setTotal]    = useState("");
      const [partners, setPartners] = useState([
        { id:1, name:"الشريك الأول",  pct:"" },
        { id:2, name:"الشريك الثاني", pct:"" },
      ]);
      const [results,  setResults]  = useState(null);
      const [resKey,   setResKey]   = useState(0);
      const nextId = useRef(3);

      const totalPct = partners.reduce((s,p) => s + (parseFloat(p.pct)||0), 0);
      const remaining = Math.max(0, 100 - totalPct);
      const isValid   = Math.abs(totalPct - 100) < 0.01;

      const addPartner = () => {
        setPartners(prev => [...prev, { id: nextId.current++, name:`الشريك ${prev.length+1}`, pct:"" }]);
        setResults(null);
      };
      const removePartner = id => { setPartners(prev => prev.filter(p=>p.id!==id)); setResults(null); };
      const updatePartner = (id, field, val) => { setPartners(prev => prev.map(p=>p.id===id?{...p,[field]:val}:p)); setResults(null); };

      const calculate = () => {
        const t = parseFloat(total);
        if (isNaN(t) || t <= 0 || !isValid) return;
        setResults(partners.map(p => ({ ...p, amount: (parseFloat(p.pct)||0) / 100 * t })));
        setResKey(k=>k+1);
      };

      const AC = "#7c3aed"; // accent

      return (
        <div style={{ width:"100%", maxWidth:440, padding:"0 20px" }}>
          <div style={{ padding:"28px 0 24px", textAlign:"center" }}>
            <p style={{ color:"rgba(255,255,255,0.3)", fontSize:13, fontWeight:500, lineHeight:1.5 }}>
              أدخل إجمالي الأرباح ونسبة كل شريك واحسب نصيب كل واحد
            </p>
          </div>

          {/* Total Profit */}
          <div style={{ background:"rgba(255,255,255,0.03)", borderRadius:20, border:"1px solid rgba(255,255,255,0.07)", padding:"20px", marginBottom:12 }}>
            <label style={{ display:"block", color:"rgba(255,255,255,0.38)", fontSize:12, fontWeight:700, letterSpacing:"0.4px", marginBottom:8 }}>
              إجمالي الأرباح
            </label>
            <input
              type="number" inputMode="decimal"
              value={total} onChange={e=>{setTotal(e.target.value);setResults(null);}}
              placeholder="1,000,000"
              style={{ width:"100%", padding:"13px 16px", borderRadius:14, border:"1.5px solid rgba(255,255,255,0.08)", background:"rgba(255,255,255,0.04)", color:"#fff", fontSize:26, fontFamily:"Cairo, sans-serif", fontWeight:900, outline:"none", textAlign:"right", transition:"border 0.2s, box-shadow 0.2s" }}
              onFocus={e=>{ e.target.style.border=`1.5px solid ${AC}`; e.target.style.boxShadow=`0 0 0 4px rgba(124,58,237,0.12)`; }}
              onBlur={e=>{ e.target.style.border="1.5px solid rgba(255,255,255,0.08)"; e.target.style.boxShadow="none"; }}
            />
          </div>

          {/* Partners */}
          <div style={{ background:"rgba(255,255,255,0.03)", borderRadius:20, border:"1px solid rgba(255,255,255,0.07)", padding:"20px", marginBottom:12 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
              <span style={{ color:"rgba(255,255,255,0.5)", fontSize:13, fontWeight:700 }}>الشركاء</span>
              {/* Percentage bar */}
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <span style={{ fontSize:12, fontWeight:700, color: isValid?"#34d399": remaining>0?"rgba(255,255,255,0.35)":"#f87171" }}>
                  {isValid ? "✓ 100%" : remaining > 0 ? `متبقي ${fmt(remaining)}%` : `زيادة ${fmt(totalPct-100)}%`}
                </span>
              </div>
            </div>

            {/* Progress bar */}
            <div style={{ height:4, background:"rgba(255,255,255,0.06)", borderRadius:99, marginBottom:18, overflow:"hidden" }}>
              <div style={{
                height:"100%", borderRadius:99,
                width:`${Math.min(totalPct,100)}%`,
                background: isValid ? "linear-gradient(90deg,#059669,#34d399)" : totalPct>100 ? "#dc2626" : "linear-gradient(90deg,#7c3aed,#a78bfa)",
                transition:"width 0.3s, background 0.3s",
              }} />
            </div>

            {partners.map((p, idx) => {
              const pc = P_COLORS[idx % P_COLORS.length];
              return (
                <div key={p.id} className="partner-enter" style={{ display:"flex", gap:8, alignItems:"center", marginBottom:10 }}>
                  {/* Color dot */}
                  <div style={{ width:10, height:10, borderRadius:"50%", background:pc.light, flexShrink:0, boxShadow:`0 0 6px ${pc.glow}` }} />
                  {/* Name */}
                  <input
                    type="text" value={p.name}
                    onChange={e=>updatePartner(p.id,"name",e.target.value)}
                    style={{ flex:1, padding:"10px 12px", borderRadius:12, border:"1.5px solid rgba(255,255,255,0.07)", background:"rgba(255,255,255,0.04)", color:"#fff", fontSize:13, fontFamily:"Cairo, sans-serif", fontWeight:700, outline:"none", textAlign:"right" }}
                    onFocus={e=>e.target.style.border=`1.5px solid ${pc.main}`}
                    onBlur={e=>e.target.style.border="1.5px solid rgba(255,255,255,0.07)"}
                  />
                  {/* Percent */}
                  <div style={{ position:"relative", width:80 }}>
                    <input
                      type="number" inputMode="decimal"
                      value={p.pct} onChange={e=>updatePartner(p.id,"pct",e.target.value)}
                      placeholder="0"
                      style={{ width:"100%", padding:"10px 28px 10px 10px", borderRadius:12, border:"1.5px solid rgba(255,255,255,0.07)", background:"rgba(255,255,255,0.04)", color:pc.light, fontSize:15, fontFamily:"Cairo, sans-serif", fontWeight:900, outline:"none", textAlign:"right" }}
                      onFocus={e=>e.target.style.border=`1.5px solid ${pc.main}`}
                      onBlur={e=>e.target.style.border="1.5px solid rgba(255,255,255,0.07)"}
                    />
                    <span style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", color:"rgba(255,255,255,0.25)", fontSize:13, fontWeight:700, pointerEvents:"none" }}>%</span>
                  </div>
                  {/* Remove */}
                  {partners.length > 2 && (
                    <button onClick={()=>removePartner(p.id)} style={{ width:32, height:32, borderRadius:10, border:"none", background:"rgba(239,68,68,0.1)", color:"rgba(239,68,68,0.6)", fontSize:16, cursor:"pointer", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"Cairo, sans-serif" }}>×</button>
                  )}
                </div>
              );
            })}

            {/* Add partner */}
            <button onClick={addPartner} style={{ width:"100%", marginTop:6, padding:"10px 0", borderRadius:12, border:"1.5px dashed rgba(255,255,255,0.1)", background:"transparent", color:"rgba(255,255,255,0.3)", fontSize:13, fontFamily:"Cairo, sans-serif", fontWeight:700, cursor:"pointer", transition:"all 0.2s" }}
              onMouseEnter={e=>{e.target.style.borderColor="rgba(124,58,237,0.5)";e.target.style.color="#a78bfa";}}
              onMouseLeave={e=>{e.target.style.borderColor="rgba(255,255,255,0.1)";e.target.style.color="rgba(255,255,255,0.3)";}}>
              + إضافة شريك
            </button>
          </div>

          {/* Calculate */}
          <button className="calc-btn" onClick={calculate}
            disabled={!isValid || !total}
            style={{
              width:"100%", padding:"16px 0", borderRadius:16, border:"none",
              background: (isValid && total) ? "linear-gradient(135deg,#7c3aed,#8b5cf6,#a78bfa)" : "rgba(255,255,255,0.06)",
              color: (isValid && total) ? "#fff" : "rgba(255,255,255,0.2)",
              fontSize:17, fontFamily:"Cairo, sans-serif", fontWeight:800,
              cursor: (isValid && total) ? "pointer" : "not-allowed",
              boxShadow: (isValid && total) ? "0 8px 24px rgba(124,58,237,0.35)" : "none",
              marginBottom:16, letterSpacing:"0.3px",
              transition:"all 0.3s",
            }}>
            {!total ? "أدخل إجمالي الأرباح أولاً" : !isValid ? `النسب لا تكمل 100%` : "احسب التوزيع"}
          </button>

          {/* Results */}
          {results && (
            <div key={resKey} className="result-enter" style={{ background:"rgba(255,255,255,0.03)", borderRadius:20, border:"1px solid rgba(255,255,255,0.07)", padding:20, marginBottom:12 }}>
              <p style={{ color:"rgba(255,255,255,0.35)", fontSize:12, fontWeight:700, letterSpacing:"0.8px", marginBottom:16, textAlign:"center" }}>توزيع الأرباح</p>
              {results.map((p,idx) => {
                const pc = P_COLORS[idx % P_COLORS.length];
                return (
                  <div key={p.id} style={{
                    display:"flex", alignItems:"center", justifyContent:"space-between",
                    padding:"14px 16px", borderRadius:14, marginBottom:8,
                    background:`linear-gradient(135deg, ${pc.main}15, ${pc.light}08)`,
                    border:`1px solid ${pc.main}30`,
                  }}>
                    <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                      <div style={{ width:36, height:36, borderRadius:10, background:`linear-gradient(135deg,${pc.main},${pc.light})`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:900, color:"#fff", boxShadow:`0 4px 10px ${pc.glow}`, flexShrink:0 }}>
                        {parseFloat(p.pct)}%
                      </div>
                      <div>
                        <p style={{ color:"#fff", fontSize:14, fontWeight:700 }}>{p.name}</p>
                        <p style={{ color:"rgba(255,255,255,0.3)", fontSize:11, fontWeight:600, marginTop:1 }}>نسبة {fmt(parseFloat(p.pct))}%</p>
                      </div>
                    </div>
                    <div style={{ textAlign:"left" }}>
                      <p style={{ color:pc.light, fontSize:20, fontWeight:900, letterSpacing:"-0.5px" }}>
                        {fmt(p.amount)}
                      </p>
                    </div>
                  </div>
                );
              })}

              {/* Total check */}
              <div style={{ marginTop:12, padding:"12px 16px", borderRadius:12, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.07)", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <span style={{ color:"rgba(255,255,255,0.4)", fontSize:13, fontWeight:700 }}>الإجمالي</span>
                <span style={{ color:"#fff", fontSize:18, fontWeight:900 }}>{fmt(parseFloat(total))}</span>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ════════════════════════════════
       Root App with Tab Navigation
    ════════════════════════════════ */
    function App() {
      const [tab, setTab] = useState("percent");

      const tabs = [
        { id:"percent", label:"حاسبة النسبة", icon:"%" },
        { id:"profit",  label:"توزيع الأرباح", icon:"🤝" },
      ];

      const accentColor = tab === "percent" ? "#8b5cf6" : "#10b981";
      const accentGlow  = tab === "percent" ? "rgba(139,92,246,0.35)" : "rgba(16,185,129,0.35)";

      return (
        <div style={{ minHeight:"100vh", background:"#0a0a0f", display:"flex", flexDirection:"column", alignItems:"center", paddingBottom:40 }}>

          {/* Top accent bar */}
          <div style={{ width:"100%", height:3, background:`linear-gradient(90deg, ${accentColor}, #fff2, ${accentColor})`, backgroundSize:"200% auto", animation:"shimmer 3s linear infinite", transition:"background 0.4s" }} />

          {/* App Header */}
          <div style={{ width:"100%", maxWidth:440, padding:"20px 20px 0" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:10, marginBottom:16 }}>
              <div style={{ width:32, height:32, borderRadius:10, background:`linear-gradient(135deg,${accentColor},#fff4)`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:15, fontWeight:900, color:"#fff", boxShadow:`0 4px 12px ${accentGlow}`, transition:"all 0.4s" }}>%</div>
              <span style={{ color:"rgba(255,255,255,0.7)", fontSize:15, fontWeight:700 }}>أدوات النسب المئوية</span>
            </div>

            {/* Tab Switcher */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6, background:"rgba(255,255,255,0.04)", borderRadius:16, padding:5, border:"1px solid rgba(255,255,255,0.06)", marginBottom:0 }}>
              {tabs.map(t => (
                <button key={t.id} onClick={()=>setTab(t.id)} style={{
                  padding:"11px 0", borderRadius:12, border:"none",
                  background: tab===t.id ? "rgba(255,255,255,0.08)" : "transparent",
                  color: tab===t.id ? "#fff" : "rgba(255,255,255,0.3)",
                  fontFamily:"Cairo, sans-serif", fontSize:14, fontWeight:700,
                  cursor:"pointer", transition:"all 0.2s", display:"flex", alignItems:"center", justifyContent:"center", gap:7,
                }}>
                  <span style={{ fontSize:16 }}>{t.icon}</span>
                  {t.label}
                </button>
              ))}
            </div>
          </div>

          {/* Screen */}
          {tab === "percent" ? <PercentCalc /> : <ProfitCalc />}

          {/* Footer */}
          <div style={{ marginTop:32, paddingBottom:8, textAlign:"center" }}>
            <p style={{ color:"rgba(255,255,255,0.12)", fontSize:12, fontWeight:600, letterSpacing:"0.3px" }}>
              تصميم وتطوير · محمد بخش
            </p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
